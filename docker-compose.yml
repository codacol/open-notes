version: '3.8'

services:
  app:
    build: .
    container_name: codacol-notes
    ports:
      - "5000:5000"  # Backend serves both API and frontend
    volumes:
      # Persist database in a data directory
      - ./data:/app/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s